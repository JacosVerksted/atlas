name: Test Rails

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/test-rails.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/test-rails.yml'

concurrency:
  group: test-rails-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  rspec:
    name: RSpec
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app
    env:
      RAILS_ENV: test
      BUNDLE_PATH: vendor/bundle
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: app
          bundler-cache: true

      - name: Prepare database
        run: bin/rails db:test:prepare

      - name: Run RSpec
        run: bundle exec rspec --format progress
