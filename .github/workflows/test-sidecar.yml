name: Test sidecar

on:
  push:
    branches: [main]
    paths:
      - 'atlas-control/**'
      - '.github/workflows/test-sidecar.yml'
  pull_request:
    branches: [main]
    paths:
      - 'atlas-control/**'
      - '.github/workflows/test-sidecar.yml'

concurrency:
  group: test-sidecar-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  go-test:
    name: go test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: atlas-control
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: atlas-control/go.sum

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...
