services:
  nginx-tiles:
    image: nginx:1.27-alpine
    container_name: atlas-nginx-tiles
    networks:
      default:
      docker_internet:
        ipv4_address: 192.168.31.23
    volumes:
      - ./nginx-tiles.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/tiles:/usr/share/nginx/html/tiles:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  postgres:
    image: postgis/postgis:17-3.5-alpine
    container_name: atlas-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-atlas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-atlas}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atlas}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    image: ${APP_IMAGE:-ghcr.io/dawarich-app/atlas/app:latest}
    pull_policy: ${APP_PULL_POLICY:-always}
    container_name: atlas-app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      default:
      docker_internet:
        ipv4_address: 192.168.31.22
    dns: 192.168.1.4
    environment:
      RAILS_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-atlas}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-atlas}}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-}
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_SERVE_STATIC_FILES: "true"
      SOLID_QUEUE_IN_PUMA: "1"
      PHOTON_URL: ${PHOTON_URL:-http://photon:2322}
      PLACEHOLDER_URL: http://placeholder:3000
      LIBPOSTAL_URL: http://libpostal:4400
      VALHALLA_URL: http://valhalla:8002
      OVERPASS_URL: http://overpass:80
      TILES_URL: ${TILES_URL:-}
      TILES_THEME: ${TILES_THEME:-light}
      DEFAULT_LAT: ${DEFAULT_LAT:-65.0}
      DEFAULT_LON: ${DEFAULT_LON:-15.0}
      DEFAULT_ZOOM: ${DEFAULT_ZOOM:-5}
      CONTROL_PLANE_URL: http://atlas-control:8090
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    volumes:
      - ./data/app:/data
      - ./regions:/rails/regions:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  atlas-control:
    image: ${ATLAS_CONTROL_IMAGE:-ghcr.io/dawarich-app/atlas/atlas-control:latest}
    pull_policy: ${ATLAS_CONTROL_PULL_POLICY:-always}
    container_name: atlas-control
    networks:
      default:
      docker_internet:
        ipv4_address: 192.168.31.24
    dns: 192.168.1.4
    environment:
      COMPOSE_FILE:         /work/compose.yml
      HOST_PROJECT_DIR:     ${HOST_PROJECT_DIR:-${PWD}}
      DATA_DIR:             /work/data
      REGIONS_DIR:          /work/regions
      LISTEN_ADDR:          ":8090"
      DOCKER_HOST:          ${DOCKER_HOST:-unix:///var/run/docker.sock}
    volumes:
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
      - .:/work:ro
      - ./data:/work/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  photon:
    image: rtuszik/photon-docker:2.2.0
    container_name: atlas-photon
    profiles: [geocoding, all]
    environment:
      UPDATE_STRATEGY: PARALLEL
      REGION: ${COUNTRY_CODE:-no}
    volumes:
      - ./data/photon:/photon/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2322/api?q=test&limit=1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  whosonfirst:
    image: pelias/whosonfirst:v8.4.0
    container_name: atlas-whosonfirst
    profiles: [data-setup]
    user: "${UID:-1001}:${GID:-1001}"
    environment:
      WHOSONFIRST_COUNTRY_CODE: ${WHOSONFIRST_COUNTRY_CODE:-${COUNTRY_CODE:-no}}
    volumes:
      - ./data/whosonfirst:/mnt/pelias/whosonfirst
    command: ["bash", "/code/pelias/whosonfirst/bin/download"]

  placeholder:
    image: pelias/placeholder:v5.5.0
    container_name: atlas-placeholder
    profiles: [geocoding, all]
    environment:
      PORT: 3000
      PLACEHOLDER_DATA: /data
      WOF_DIR: /wof/sqlite
    volumes:
      - ./data/placeholder:/data
      - ./data/whosonfirst:/wof:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/demo"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  libpostal:
    image: pelias/libpostal-service:nodejs-20
    container_name: atlas-libpostal
    profiles: [geocoding, all]
    restart: unless-stopped

  valhalla:
    image: ghcr.io/gis-ops/docker-valhalla/valhalla:3.5.1
    container_name: atlas-valhalla
    profiles: [routing, all]
    environment:
      serve_tiles: "True"
      build_admins: "True"
      build_elevation: ${BUILD_ELEVATION:-False}
      use_tiles_ignore_pbf: "False"
    volumes:
      - ./data/valhalla:/custom_files
      - ./data/srtm:/custom_files/elevation_data
      - ./data/osm:/osm:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8002/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  overpass:
    image: wiktorn/overpass-api:v0.7.62.11
    container_name: atlas-overpass
    profiles: [pois, all]
    environment:
      OVERPASS_META: ${OVERPASS_META:-no}
      OVERPASS_MODE: init
      OVERPASS_PLANET_URL: file:///osm/current.osm.bz2
      OVERPASS_DIFF_URL: ${OVERPASS_DIFF_URL:-https://download.geofabrik.de/europe/norway-updates/}
      OVERPASS_RULES_LOAD: 10
      OVERPASS_COMPRESSION: lz4
    volumes:
      - ./data/overpass:/db
      - ./data/osm:/osm:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -gsf 'http://localhost/api/interpreter?data=[out:json];node(1);out;' | grep -q elements"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s
    restart: unless-stopped


networks:
  docker_internet:
    external: true
